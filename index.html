<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#e64a99">
<title>emoji</title>
<link rel="manifest" href="./emoji-manifest.json">
<link rel="apple-touch-icon" href="./assets/app-icon.jpg">
<link rel="icon" type="image/jpeg" href="./assets/app-icon.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="emoji">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    /* Hello Kitty + Tamagotchi pink palette */
    --bg: #ffc4dc;            /* main background pink */
    --bg-soft: #ffd9e8;        /* softer pink wash */
    --frame: #ff85b5;          /* tamagotchi outer frame */
    --frame-dark: #e8689a;     /* frame shadow */
    --frame-deep: #b94170;     /* deep frame edge */
    --key: #fff5fa;            /* button face, very light pink */
    --key-edge: #ffafd0;       /* button edge pink */
    --key-shadow: #e87fab;     /* under-key shadow */
    --magenta: #e64a99;        /* active hot magenta */
    --magenta-dark: #b03377;   /* deep magenta */
    --magenta-deep: #7a1f50;   /* deepest magenta */
    --ink: #5d2a4a;            /* primary text - dark plum */
    --ink-soft: #8b4a73;       /* secondary text */
    --muted: #c789a8;          /* muted pink-gray */
    --paper: #fff8fc;          /* screen / paper white */
    --screen: #fef0f7;         /* tamagotchi screen tint */
    --mint: #b8e6e1;           /* tamagotchi accent dot */
    --yellow: #fde68a;         /* sparkle accent */
  }
  html, body {
    margin: 0; padding: 0;
    min-height: 100%;
    color: var(--ink);
    font-family: "Apple SD Gothic Neo", "Pretendard", -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Noto Sans KR", "Segoe UI", sans-serif;
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; flex-direction: column; min-height: 100vh;
    background-color: var(--bg);
  }
  /* Fixed bg layer — fills viewport on cover, scroll-stable on mobile Safari */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image: var(--bg-image, url('./assets/background.jpg'));
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    pointer-events: none;
    z-index: -2;
  }
  /* Soft overlay sits between bg image and content */
  body::after {
    content: "";
    position: fixed; inset: 0;
    background: var(--overlay, linear-gradient(180deg, rgba(255, 196, 220, 0.4) 0%, rgba(255, 175, 208, 0.5) 100%));
    pointer-events: none;
    z-index: -1;
  }

  /* ===== Top FAB row ===== */
  .top-fabs {
    position: fixed;
    top: max(12px, env(safe-area-inset-top));
    right: max(12px, env(safe-area-inset-right));
    display: flex; gap: 8px;
    z-index: 20;
  }
  .fab {
    width: 36px; height: 36px;
    padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255, 255, 255, 0.78);
    color: var(--ink);
    border: 1px solid rgba(0, 0, 0, 0.06);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    border-radius: 999px;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .fab:active { transform: scale(0.94); }
  .fab.active {
    background: var(--magenta);
    color: white;
    border-color: var(--magenta);
  }

  /* ===== Share modal ===== */
  .share-backdrop {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.32);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 70;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .share-backdrop.show { opacity: 1; }
  .share-modal {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 80;
    background: var(--paper);
    border-top-left-radius: 24px;
    border-top-right-radius: 24px;
    padding: 14px 16px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(110%);
    transition: transform 0.25s cubic-bezier(0.34, 1.3, 0.64, 1);
    box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.1);
  }
  .share-modal.show { transform: translateY(0); }
  .share-handle {
    width: 44px; height: 5px;
    background: var(--key-edge);
    border-radius: 3px;
    margin: 0 auto 14px;
  }
  .share-title {
    font-size: 11px;
    font-weight: 800;
    color: var(--ink-soft);
    text-transform: lowercase;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 14px;
  }
  .share-options {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .share-opt {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 6px;
    padding: 14px 6px;
    background: var(--key);
    color: var(--ink);
    border: 1px solid var(--key-edge);
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: lowercase;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    transition: transform 0.1s ease, background 0.15s ease;
  }
  .share-opt:active { transform: scale(0.95); }
  .share-opt .icon { font-size: 22px; line-height: 1; }
  .share-opt.kakao { background: #fee500; color: #3b1e1e; border-color: #f7d800; }

  /* ===== DRAWER : tabs / theme ===== */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(93, 42, 74, 0.35);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 50;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .drawer-backdrop.show { opacity: 1; }
  .drawer {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 60;
    background: var(--paper);
    border-bottom-left-radius: 24px;
    border-bottom-right-radius: 24px;
    padding: 14px 16px 20px;
    transform: translateY(-110%);
    transition: transform 0.25s cubic-bezier(0.34, 1.4, 0.64, 1);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    max-height: 85vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .drawer.show { transform: translateY(0); }
  .drawer-handle {
    width: 44px; height: 5px;
    background: var(--frame);
    border-radius: 3px;
    margin: 0 auto 12px;
  }
  .drawer-title {
    font-family: inherit;
    font-size: 11px;
    font-weight: 800;
    color: var(--ink-soft);
    text-transform: lowercase;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 12px;
  }
  .tabs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 8px;
  }
  .tab {
    padding: 10px 12px;
    background: var(--key);
    color: var(--ink);
    font-family: inherit;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.3px;
    cursor: pointer; user-select: none;
    border: 1.5px solid var(--key-edge);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 0 rgba(0, 0, 0, 0.02);
    border-radius: 14px;
    white-space: nowrap;
    text-transform: lowercase;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .tab:active {
    transform: scale(0.96);
  }
  .tab.active {
    background: var(--magenta);
    color: white;
    border-color: var(--magenta-dark);
  }

  /* ===== Theme picker ===== */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }
  .theme-card {
    display: flex; flex-direction: column; gap: 6px;
    padding: 8px;
    background: var(--key);
    border: 1.5px solid var(--key-edge);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 0 rgba(0, 0, 0, 0.02);
    border-radius: 16px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 800;
    font-size: 11px;
    color: var(--ink);
    text-transform: lowercase;
    letter-spacing: 0.5px;
    transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .theme-card:active {
    transform: scale(0.96);
  }
  .theme-card.active {
    background: var(--magenta);
    color: white;
    border-color: var(--magenta-dark);
  }
  .theme-thumb {
    width: 100%;
    aspect-ratio: 3/4;
    border-radius: 10px;
    background-size: cover;
    background-position: center;
    border: 1.5px solid rgba(0,0,0,0.05);
  }

  main { flex: 1; padding: 60px 14px 24px; padding-top: calc(max(12px, env(safe-area-inset-top)) + 72px); position: relative; z-index: 1; }
  @media (min-width: 768px) {
    main { max-width: 760px; margin: 0 auto; }
  }

  /* ===== GRID buttons : pink keycaps ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(54px, 1fr));
    gap: 7px;
  }
  .sym-btn {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    background: var(--key);
    border: 1.5px solid var(--key-edge);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 0 rgba(0, 0, 0, 0.02);
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
    position: relative;
    color: var(--ink);
    line-height: 1;
    padding: 4px;
    overflow: hidden;
    word-break: break-all;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", "Noto Sans KR", sans-serif;
  }
  .sym-btn:active {
    transform: scale(0.95);
    background: var(--magenta);
    color: white;
    border-color: var(--magenta-dark);
  }
  .sym-btn.fav::after {
    content: "♥"; position: absolute; top: 2px; right: 4px;
    font-size: 10px; color: var(--magenta);
  }

  /* ===== COMBO list : pink bar keys ===== */
  .combo-list {
    display: flex; flex-direction: column; gap: 8px;
  }
  .combo-btn {
    padding: 14px 16px;
    background: var(--key);
    border: 1.5px solid var(--key-edge);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 0 rgba(0, 0, 0, 0.02);
    border-radius: 16px;
    font-size: 16px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
    position: relative;
    color: var(--ink);
    word-break: break-all;
    line-height: 1.6;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", "Noto Sans KR", sans-serif;
  }
  .combo-btn:active {
    transform: scale(0.95);
    background: var(--magenta);
    color: white;
    border-color: var(--magenta-dark);
  }
  .combo-btn.fav::after {
    content: "♥"; position: absolute; top: 6px; right: 10px;
    font-size: 12px; color: var(--magenta);
  }

  /* ===== Pager ===== */
  .pager {
    display: flex; align-items: center; justify-content: center;
    gap: 12px;
    margin-top: 12px; padding: 6px 0 4px;
  }
  .pager-btn {
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    background: var(--key);
    border: 1.5px solid var(--key-edge);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 0 rgba(0, 0, 0, 0.02);
    border-radius: 12px;
    color: var(--ink);
    font-size: 20px; font-weight: 700;
    cursor: pointer; user-select: none;
    transition: transform 0.1s ease, opacity 0.15s ease, background 0.15s ease;
  }
  .pager-btn:not(:disabled):active {
    transform: scale(0.96);
    background: var(--magenta);
    color: white;
    border-color: var(--magenta-dark);
  }
  .pager-btn:disabled {
    opacity: 0.35;
    cursor: default;
  }
  .pager-info {
    font-size: 13px; font-weight: 600;
    color: var(--ink-soft);
    min-width: 44px; text-align: center;
    letter-spacing: 0.3px;
  }

  /* ===== FONT converter ===== */
  .font-input-wrap { margin-bottom: 14px; }
  #font-input {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--key-edge);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 0 rgba(0, 0, 0, 0.02);
    border-radius: 16px;
    outline: none;
    background: var(--paper);
    color: var(--ink);
    font-family: inherit;
    font-weight: 600;
    font-size: 15px;
  }
  #font-input:focus { border-color: var(--magenta); }
  #font-input::placeholder { color: var(--muted); font-weight: 500; }
  .font-row {
    padding: 14px 16px;
    background: var(--key);
    border: 1.5px solid var(--key-edge);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 0 rgba(0, 0, 0, 0.02);
    border-radius: 16px;
    cursor: pointer;
    position: relative;
    color: var(--ink);
    word-break: break-all;
    line-height: 1.6;
    transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
    width: 100%;
    text-align: left;
  }
  .font-row:active {
    transform: scale(0.95);
    background: var(--magenta);
    color: white;
    border-color: var(--magenta-dark);
  }
  .font-row .label {
    display: block;
    font-family: inherit;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: lowercase;
    letter-spacing: 1.2px;
    font-weight: 800;
  }
  .font-row:active .label { color: rgba(255,255,255,0.85); }
  .font-row .preview {
    font-size: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", "Noto Sans KR", sans-serif;
  }
  .font-row.fav::after {
    content: "♥"; position: absolute; top: 6px; right: 10px;
    font-size: 12px; color: var(--magenta);
  }

  /* ===== PAD : tamagotchi screen ===== */
  .pad-wrap {
    display: flex; flex-direction: column;
  }
  .pad-screen {
    position: relative;
    padding: 18px 10px 10px;
    background: var(--frame);
    border-radius: 20px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
  }
  /* spiral binding dots on top edge */
  .pad-screen::before {
    content: "";
    position: absolute;
    top: 6px; left: 14px; right: 14px;
    height: 6px;
    background-image: radial-gradient(circle, rgba(0,0,0,0.18) 38%, transparent 42%);
    background-size: 18px 6px;
    background-repeat: repeat-x;
    background-position: 0 center;
    opacity: 0.6;
  }
  #pad-input {
    display: block;
    width: 100%;
    min-height: 168px;
    padding: 14px 18px 14px 52px;
    background-color: #fffaf3;
    background-image:
      linear-gradient(to right, transparent 40px, rgba(231, 130, 156, 0.38) 40px, rgba(231, 130, 156, 0.38) 41px, transparent 41px),
      repeating-linear-gradient(to bottom, transparent 0, transparent 27px, rgba(140, 175, 210, 0.32) 28px);
    background-attachment: local;
    border: 1px solid rgba(0, 0, 0, 0.05);
    border-radius: 14px;
    font-family: "Caveat", "Patrick Hand", "Apple SD Gothic Neo", -apple-system, sans-serif;
    font-weight: 500;
    font-size: 18px;
    line-height: 28px;
    color: #4a3540;
    resize: vertical;
    outline: none;
  }
  #pad-input:focus {
    background-color: #fffefb;
    border-color: rgba(231, 130, 156, 0.5);
  }
  #pad-input::placeholder { color: rgba(74, 53, 64, 0.35); font-weight: 500; font-style: italic; }
  .pad-actions {
    display: flex; gap: 12px;
    justify-content: center;
    margin-top: 22px;
  }
  .pad-btn {
    flex: 0 0 auto;
    padding: 9px 26px;
    background: var(--key);
    border: 1.5px solid var(--key-edge);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 0 rgba(0, 0, 0, 0.02);
    border-radius: 12px;       /* rectangular — different from the pill tabs */
    font-family: inherit;
    font-size: 12px;
    font-weight: 800;
    color: var(--ink);
    cursor: pointer;
    text-transform: uppercase;  /* uppercase makes them feel like distinct action keys */
    letter-spacing: 1.5px;
    transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .pad-btn:active {
    transform: scale(0.96);
  }
  .pad-btn.primary {
    background: var(--magenta);
    color: white;
    border-color: var(--magenta);
  }

  /* ===== PAD divider (between actions and tabs) ===== */
  .pad-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 16px 2px 8px;
  }
  .pad-divider::before,
  .pad-divider::after {
    content: "";
    flex: 1;
    height: 0;
    border-top: 2px dashed var(--key-edge);
    opacity: 0.7;
  }
  .pad-divider span {
    font-size: 13px;
    color: var(--magenta);
    opacity: 0.55;
    line-height: 1;
  }
  .quick-section { margin-top: 6px; }
  .quick-label {
    font-family: inherit;
    font-size: 10px;
    font-weight: 800;
    color: var(--ink-soft);
    text-transform: lowercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .quick-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .quick-chip {
    padding: 7px 12px;
    background: var(--key);
    border: 1.5px solid var(--key-edge);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 0 rgba(0, 0, 0, 0.02);
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
    color: var(--ink);
    transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", "Noto Sans KR", sans-serif;
    max-width: 100%;
    word-break: break-all;
  }
  .quick-chip:active {
    transform: scale(0.96);
    background: var(--magenta);
    color: white;
    border-color: var(--magenta-dark);
  }

  .empty {
    text-align: center; color: var(--ink-soft); padding: 40px 20px;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.7;
    font-family: inherit;
    letter-spacing: 0.3px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--magenta);
    color: white;
    padding: 10px 22px;
    border: none;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.8px;
    text-transform: lowercase;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    opacity: 0; pointer-events: none;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    max-width: 90%;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hint {
    font-size: 10px; color: var(--ink-soft);
    text-align: center; padding: 4px 0 14px;
    line-height: 1.6;
    font-family: inherit;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: lowercase;
  }

  /* ===== PREVIEW internal tabs (horizontal scroll) ===== */
  .preview-tabs {
    display: flex; flex-wrap: nowrap; gap: 6px;
    padding: 4px 2px 8px;
    margin: 0 -2px;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    scroll-snap-type: x proximity;
    -webkit-mask-image: linear-gradient(to right, black 0, black calc(100% - 28px), transparent 100%);
    mask-image: linear-gradient(to right, black 0, black calc(100% - 28px), transparent 100%);
  }
  .preview-tabs.scrolled-end {
    -webkit-mask-image: linear-gradient(to right, transparent 0, black 28px, black 100%);
    mask-image: linear-gradient(to right, transparent 0, black 28px, black 100%);
  }
  .preview-tabs.scrolled-mid {
    -webkit-mask-image: linear-gradient(to right, transparent 0, black 28px, black calc(100% - 28px), transparent 100%);
    mask-image: linear-gradient(to right, transparent 0, black 28px, black calc(100% - 28px), transparent 100%);
  }
  .preview-tabs::-webkit-scrollbar { display: none; }
  .ptab {
    flex: 0 0 auto;
    padding: 7px 13px 6px;
    background: var(--key);
    color: var(--ink);
    font-family: inherit;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.3px;
    cursor: pointer; user-select: none;
    border: 1.5px solid var(--key-edge);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 1px 0 rgba(0, 0, 0, 0.02);
    border-radius: 999px;
    white-space: nowrap;
    text-transform: lowercase;
    scroll-snap-align: start;

/* ============================================
   Font converter (igfonts.io style)
   ============================================ */
const SCRIPT_MAP = {
  'B':'ℬ','E':'ℰ','F':'ℱ','H':'ℋ','I':'ℐ','L':'ℒ','M':'ℳ','R':'ℛ',
  'e':'ℯ','g':'ℊ','o':'ℴ'
};
const FRAKTUR_MAP = {
  'C':'ℭ','H':'ℌ','I':'ℑ','R':'ℜ','Z':'ℨ'
};
const DOUBLESTRUCK_MAP = {
  'C':'ℂ','H':'ℍ','N':'ℕ','P':'ℙ','Q':'ℚ','R':'ℝ','Z':'ℤ'
};
const ITALIC_MAP = { 'h':'ℎ' };

function offsetConvert(str, upperBase, lowerBase, digitBase, specialMap) {
  let out = '';
  for (const ch of str) {
    const code = ch.codePointAt(0);
    if (specialMap && specialMap[ch]) { out += specialMap[ch]; continue; }
    if (code >= 65 && code <= 90 && upperBase != null) {
      out += String.fromCodePoint(upperBase + (code - 65));
    } else if (code >= 97 && code <= 122 && lowerBase != null) {
      out += String.fromCodePoint(lowerBase + (code - 97));
    } else if (code >= 48 && code <= 57 && digitBase != null) {
      out += String.fromCodePoint(digitBase + (code - 48));
    } else {
      out += ch;
    }
  }
  return out;
}

const SMALL_CAPS_MAP = {
  a:'ᴀ',b:'ʙ',c:'ᴄ',d:'ᴅ',e:'ᴇ',f:'ꜰ',g:'ɢ',h:'ʜ',i:'ɪ',j:'ᴊ',k:'ᴋ',l:'ʟ',m:'ᴍ',
  n:'ɴ',o:'ᴏ',p:'ᴘ',q:'ǫ',r:'ʀ',s:'s',t:'ᴛ',u:'ᴜ',v:'ᴠ',w:'ᴡ',x:'x',y:'ʏ',z:'ᴢ'
};
function smallCapsConvert(str) {
  return str.split('').map(c => {
    const lower = c.toLowerCase();
    return SMALL_CAPS_MAP[lower] || c;
  }).join('');
}

async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast(`✓ copied`);
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(`✓ copied`);
  }
}

  if (!openedDrawer) return;

  backdrop.classList.remove('show');

  openedDrawer = null;

    backdrop.hidden = true;
    themeD.hidden = true;
    closeTimer = null;
  }, 250);
}

/* ============================================
   Picker rendering (within preview)
   ============================================ */
function paginate(items, size) {
  const pages = Math.max(1, Math.ceil(items.length / size));
  let page = pageState[activeTab] || 0;
  if (page >= pages) page = pages - 1;
  if (page < 0) page = 0;
  pageState[activeTab] = page;
  return { sliced: items.slice(page * size, page * size + size), page, pages };
}

function pagerHtml(page, pages) {
  if (pages <= 1) return '';
  return `<div class="pager">
    <button class="pager-btn" data-pager="prev" ${page === 0 ? 'disabled' : ''} aria-label="prev">‹</button>
    <span class="pager-info">${page + 1} / ${pages}</span>
    <button class="pager-btn" data-pager="next" ${page === pages - 1 ? 'disabled' : ''} aria-label="next">›</button>
  </div>`;
}

function renderSymGrid(items) {
  if (!items.length) return emptyMsg();
  const { sliced, page, pages } = paginate(items, PAGE_SIZE.sym);
  return `<div class="grid">${sliced.map(it => {
    const val = typeof it === 'string' ? it : it.s;
    const k = typeof it === 'string' ? '' : (it.k || '');
    const isFav = favorites.has(val);
    return `<button class="sym-btn ${isFav ? 'fav' : ''}" data-text="${escapeAttr(val)}" title="${escapeAttr(k)}">${escapeHtml(val)}</button>`;
  }).join('')}</div>${pagerHtml(page, pages)}`;
}

function renderComboList(items) {
  if (!items.length) return emptyMsg();
  const { sliced, page, pages } = paginate(items, PAGE_SIZE.combo);
  return `<div class="combo-list">${sliced.map(s => {
    const val = typeof s === 'string' ? s : s.s;
    const isFav = favorites.has(val);
    return `<button class="combo-btn ${isFav ? 'fav' : ''}" data-text="${escapeAttr(val)}">${escapeHtml(val)}</button>`;
  }).join('')}</div>${pagerHtml(page, pages)}`;
}

function renderFontRows() {
  const input = (localStorage.getItem(STORAGE_KEYS.padText) || '').trim() || 'your text';
  const rows = FONT_STYLES.map(style => {
    const converted = style.fn(input);
    return `<button class="font-row" data-font="${escapeAttr(converted)}" data-label="${escapeAttr(style.name)}">
      <span class="label">${escapeHtml(style.name)}</span>
      <span class="preview">${escapeHtml(converted)}</span>
    </button>`;
  }).join('');
  return `<div class="combo-list">${rows}</div>`;
}

function emptyMsg() {
  if (activeTab === "recent") return `<div class="empty">no recent items yet<br>tap symbols below to fill ✧</div>`;
  if (activeTab === "favorites") return `<div class="empty">no favorites yet<br>long-press a symbol to save ♥</div>`;
  return `<div class="empty">no items</div>`;
}

function renderPicker() {
  if (activeTab === 'fonts') return renderFontRows();
  if (activeTab === 'recent') {
    return recent.length ? renderComboList(recent.slice(0, 100)) : emptyMsg();
  }
  if (activeTab === 'favorites') {
    const list = [...favorites];
    return list.length ? renderComboList(list) : emptyMsg();
  }
  if (LIST_TABS.has(activeTab)) {
    return renderComboList(COMBO_DATA[activeTab] || []);
  }
  return renderSymGrid(SYMBOL_DATA[activeTab] || []);
}

  const end = ta.selectionEnd ?? ta.value.length;
  ta.value = ta.value.slice(0, start) + text + ta.value.slice(end);
  ta.selectionStart = ta.selectionEnd = start + text.length;
  ta.focus();
  localStorage.setItem(STORAGE_KEYS.padText, ta.value);
}

function attachPreviewHandlers() {
  const ta = document.getElementById('pad-input');
  const copyBtn = document.getElementById('pad-copy');
  const clearBtn = document.getElementById('pad-clear');

  ta.addEventListener('input', () => {
    localStorage.setItem(STORAGE_KEYS.padText, ta.value);
    if (activeTab === 'fonts') refreshPicker();
  });

  copyBtn.addEventListener('click', () => {
    if (!ta.value) { showToast('nothing to copy'); return; }
    copyToClipboard(ta.value);
  });

  clearBtn.addEventListener('click', () => {
    ta.value = '';
    localStorage.removeItem(STORAGE_KEYS.padText);
    ta.focus();
    if (activeTab === 'fonts') refreshPicker();
  });

  const tabsEl = document.getElementById('preview-tabs');
  document.querySelectorAll('#preview-tabs .ptab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      pageState[activeTab] = 0;
      document.querySelectorAll('#preview-tabs .ptab').forEach(b => b.classList.toggle('active', b === btn));
      refreshPicker();
      // Scroll active tab into view
      btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    });
  });

  // Desktop: vertical wheel → horizontal scroll on the tab strip
  tabsEl.addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
      e.preventDefault();
      tabsEl.scrollLeft += e.deltaY;
    }
  }, { passive: false });

  const updateScrollEdges = () => {
    const max = tabsEl.scrollWidth - tabsEl.clientWidth;
    const left = tabsEl.scrollLeft;
    tabsEl.classList.toggle('scrolled-end', left >= max - 2);
    tabsEl.classList.toggle('scrolled-mid', left > 2 && left < max - 2);
  };
  tabsEl.addEventListener('scroll', updateScrollEdges);
  updateScrollEdges();
  // Auto-scroll the active tab into view on first render
  const activeBtn = tabsEl.querySelector('.ptab.active');
  if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', block: 'nearest' });

  attachPickerHandlers();
}

function attachPickerHandlers() {
  // Pager: prev/next page within the current category
  document.querySelectorAll('#quick-picker .pager-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      const dir = btn.dataset.pager;
      pageState[activeTab] = (pageState[activeTab] || 0) + (dir === 'next' ? 1 : -1);
      refreshPicker();
      const picker = document.getElementById('quick-picker');
      if (picker) picker.scrollTop = 0;
    });
  });

  // Font rows: tap = replace textarea content with styled version
  document.querySelectorAll('#quick-picker .font-row').forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.dataset.font;
      const ta = document.getElementById('pad-input');
      ta.value = text;
      localStorage.setItem(STORAGE_KEYS.padText, text);
      showToast(`${btn.dataset.label} applied`);
    });
  });

  // Symbol / combo / chip buttons: tap = insert, long-press = favorite
  document.querySelectorAll('#quick-picker .sym-btn, #quick-picker .combo-btn').forEach(btn => {
    let pressTimer;
    let longPressed = false;

    btn.addEventListener('click', () => {
      if (longPressed) { longPressed = false; return; }
      const text = btn.dataset.text;
      addToRecent(text);
      insertIntoPad(text);
    });

    btn.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      toggleFav(btn.dataset.text);
      refreshPicker();
    });

    const startPress = () => {
      pressTimer = setTimeout(() => {
        longPressed = true;
        toggleFav(btn.dataset.text);
        if (navigator.vibrate) navigator.vibrate(50);
        refreshPicker();
      }, 500);
    };
    const cancelPress = () => clearTimeout(pressTimer);
    btn.addEventListener('touchstart', startPress, { passive: true });
    btn.addEventListener('touchend', cancelPress);
    btn.addEventListener('touchmove', cancelPress);
    btn.addEventListener('mousedown', startPress);
    btn.addEventListener('mouseup', cancelPress);
    btn.addEventListener('mouseleave', cancelPress);
  });
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  if (openedDrawer === 'theme') closeDrawer();
  else openDrawer('theme');
});

const SHARE_URL = location.origin + location.pathname;
const SHARE_TEXT = '감성 텍스트 이모지 키보드 ✿ — aesthetic text emoji';

function openShareModal() {
  const backdrop = document.getElementById('share-backdrop');
  const modal = document.getElementById('share-modal');
  backdrop.hidden = false;
  modal.hidden = false;
  requestAnimationFrame(() => {
    backdrop.classList.add('show');
    modal.classList.add('show');
  });
}
function closeShareModal() {
  const backdrop = document.getElementById('share-backdrop');
  const modal = document.getElementById('share-modal');
  backdrop.classList.remove('show');
  modal.classList.remove('show');
  setTimeout(() => { backdrop.hidden = true; modal.hidden = true; }, 250);
}

async function tryNativeShare() {
  if (!navigator.share) return false;
  try {
    await navigator.share({
      title: 'aesthetic text emoji ♡',
      text: SHARE_TEXT,
      url: SHARE_URL,
    });
    return true;
  } catch (e) {
    if (e && e.name === 'AbortError') return true;
    return false;
  }
}

document.getElementById('share-btn').addEventListener('click', async () => {
  // 모바일 기본 공유 시트가 카카오톡/문자 등을 포함하므로 우선 시도
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if (isMobile && navigator.share) {
    const ok = await tryNativeShare();
    if (ok) return;
  }
  openShareModal();
});

document.getElementById('share-backdrop').addEventListener('click', closeShareModal);

document.querySelectorAll('#share-modal .share-opt').forEach(btn => {
  btn.addEventListener('click', async () => {
    const action = btn.dataset.share;
    const text = encodeURIComponent(`${SHARE_TEXT}\n${SHARE_URL}`);
    const subject = encodeURIComponent('aesthetic text emoji ♡');
    const body = encodeURIComponent(`${SHARE_TEXT}\n\n${SHARE_URL}`);
    if (action === 'kakao') {
      // KakaoTalk 공식 공유 SDK가 없을 때의 우회: 모바일에선 카카오톡 앱을 통한 텍스트 공유가 native sheet에서 가능
      // 여기서는 링크를 복사해주고 카카오톡을 띄움
      try { await navigator.clipboard.writeText(SHARE_URL); } catch {}
      // iOS/Android에서 카카오톡 앱이 설치돼 있으면 실행 시도
      window.location.href = 'kakaotalk://';
      showToast('link copied — paste in kakaotalk');
      closeShareModal();
    } else if (action === 'sms') {
      // iOS는 ?&body, Android는 ?body — 둘 다 호환
      const sep = /iPhone|iPad|iPod/i.test(navigator.userAgent) ? '&' : '?';
      window.location.href = `sms:${sep}body=${text}`;
      closeShareModal();
    } else if (action === 'email') {
      window.location.href = `mailto:?subject=${subject}&body=${body}`;
      closeShareModal();
    } else if (action === 'copy') {
      try {
        await navigator.clipboard.writeText(SHARE_URL);
        showToast('link copied ♥');
      } catch {
        showToast('copy failed');
      }
      closeShareModal();
    }
  });
});
document.getElementById('drawer-backdrop').addEventListener('click', closeDrawer);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (openedDrawer) closeDrawer();
    if (!document.getElementById('share-modal').hidden) closeShareModal();
  }
});

applyTheme(activeTheme);
render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./emoji-sw.js').then((reg) => {
      reg.addEventListener('updatefound', () => {
        const sw = reg.installing;
        if (!sw) return;
        sw.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) {
            sw.postMessage('SKIP_WAITING');
          }
        });
      });
      setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
    }).catch(() => {});

    let reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloading) return;
      reloading = true;
      window.location.reload();
    });
  });
}
</script>
